<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/Kisaan%20Mitra%20Favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kisaan-mitra-app</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Hidden statically-rendered forms for Netlify detection -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="subject" />
      <textarea name="message"></textarea>
    </form>
    <form name="newsletter" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="email" name="email" />
    </form>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
